<svg xmlns="http://www.w3.org/2000/svg" width="409" height="282" viewBox="0 0 409 282" role="img" aria-label="Carregando">
  <rect width="409" height="282" fill="transparent"/>

  <image href="/logo1.svg" x="82" y="26" width="245" height="138" preserveAspectRatio="xMidYMid meet"/>

  <g transform="translate(204 219)">
    <g>
      <circle cx="-22" cy="0" r="5" fill="#d4ac55" opacity="0.35"/>
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -5; 0 0"
        dur="1.2s"
        repeatCount="indefinite"/>
      <animate
        attributeName="opacity"
        values="0.35;1;0.35"
        dur="1.2s"
        repeatCount="indefinite"/>
    </g>

    <g>
      <circle cx="0" cy="0" r="5" fill="#d4ac55" opacity="0.35"/>
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -5; 0 0"
        dur="1.2s"
        begin="0.2s"
        repeatCount="indefinite"/>
      <animate
        attributeName="opacity"
        values="0.35;1;0.35"
        dur="1.2s"
        begin="0.2s"
        repeatCount="indefinite"/>
    </g>

    <g>
      <circle cx="22" cy="0" r="5" fill="#d4ac55" opacity="0.35"/>
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -5; 0 0"
        dur="1.2s"
        begin="0.4s"
        repeatCount="indefinite"/>
      <animate
        attributeName="opacity"
        values="0.35;1;0.35"
        dur="1.2s"
        begin="0.4s"
        repeatCount="indefinite"/>
    </g>
  </g>
</svg>
